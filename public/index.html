<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat inteligente com IA">
    <meta name="theme-color" content="#ffffff">
    <title>Basic AI Chatbot Template</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Container principal -->
    <div class="app-container">
        
        <!-- Tela de boas-vindas -->
        <div class="welcome-screen" id="welcomeScreen">
            <div class="welcome-content">
                <h1 class="welcome-title">Basic AI Chatbot Template</h1>
                <p class="welcome-text">
                    This is an AI chatbot app template built with <strong>Next.js</strong>, the
                    <strong>Vercel AI SDK</strong>, and <strong>Vercel KV</strong>.
                </p>
                <p class="welcome-hint">
                    Connect an API Key from your provider and send a message to get started.
                </p>
            </div>
        </div>

        <!-- Área de chat -->
        <div class="chat-screen" id="chatScreen" style="display: none;">
            <!-- Mensagens -->
            <div class="messages-container" id="messagesContainer">
                <div class="messages-list" id="messagesList"></div>
            </div>
        </div>

        <!-- Input fixo na parte inferior -->
        <div class="input-container">
            <form class="input-form" id="chatForm">
                <div class="input-wrapper">
                    <textarea 
                        id="userInput" 
                        placeholder="Enter a message"
                        rows="1"
                        maxlength="4000"
                        class="message-input"
                    ></textarea>
                    
                    <button type="submit" class="submit-button" id="submitBtn" title="Send message">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 19V5M5 12l7-7 7 7"/>
                        </svg>
                    </button>
                </div>
            </form>
        </div>

    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>

</html>
