<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chat inteligente com IA - Converse com nosso assistente virtual">
    <meta name="theme-color" content="#0969da">
    <title>Chat IA - Assistente Inteligente 🤖</title>

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Preconnect para melhor performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>

<body>
    <!-- Container principal -->
    <div class="app-container">
        
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h1>Assistente IA</h1>
                </div>
                <p class="subtitle">Converse com inteligência artificial</p>
            </div>
            
            <!-- Status indicator -->
            <div class="status-indicator">
                <span class="status-dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Conectando...</span>
            </div>
        </header>

        <!-- Chat area -->
        <main class="chat-container">
            <div class="chat-area" id="chatArea">
                <!-- Mensagem de boas-vindas -->
                <div class="welcome-message">
                    <div class="welcome-icon">👋</div>
                    <h2>Olá! Como posso ajudar?</h2>
                    <p>Faça qualquer pergunta ou inicie uma conversa</p>
                    
                    <div class="quick-actions">
                        <button class="quick-btn" data-message="Explique o que é inteligência artificial">
                            💡 O que é IA?
                        </button>
                        <button class="quick-btn" data-message="Me conte uma curiosidade interessante">
                            🎯 Curiosidade
                        </button>
                        <button class="quick-btn" data-message="Me ajude a resolver um problema">
                            🔧 Resolver problema
                        </button>
                    </div>
                </div>
            </div>

            <!-- Scroll to bottom button -->
            <button class="scroll-bottom" id="scrollBottomBtn" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 5v14M19 12l-7 7-7-7"></path>
                </svg>
            </button>
        </main>

        <!-- Input area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    placeholder="Digite sua mensagem..."
                    rows="1"
                    maxlength="4000"
                ></textarea>
                
                <div class="input-actions">
                    <button class="clear-btn" id="clearBtn" title="Limpar conversa">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                    </button>
                    
                    <button class="send-btn" id="sendBtn" title="Enviar mensagem">
                        <svg class="send-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"></path>
                        </svg>
                        <span class="send-text">Enviar</span>
                    </button>
                </div>
            </div>
            
            <div class="input-info">
                <span class="char-count" id="charCount">0 / 4000</span>
                <span class="tip">Pressione <kbd>Enter</kbd> para enviar</span>
            </div>
        </footer>
    </div>

    <!-- Toast notification -->
    <div class="toast" id="toast"></div>

    <!-- JavaScript -->
    <script src="js/app.js"></script>
</body>

</html>
